name: "🐛 Bug Report"
description: Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Merci de remplir ce formulaire avec le maximum de détails.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Une description claire et concise du problème
      placeholder: "Décrivez le bug..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Faire défiler jusqu'à '...'
        4. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Comportement attendu
      description: Ce qui devrait se passer
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Comportement actuel
      description: Ce qui se passe réellement
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran / Logs
      description: Si applicable, ajoutez des captures d'écran ou des logs d'erreur
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - "🔴 Critique - bloque la production"
        - "🟠 Haute - fonctionnalité majeure cassée"
        - "🟡 Moyenne - fonctionnalité dégradée"
        - "🟢 Faible - cosmétique / mineur"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environnement
      placeholder: "ex: Production / Chrome 120 / Windows 11"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / Commit SHA
      placeholder: "ex: v1.2.3 ou abc1234"
    validations:
      required: false

  - type: input
    id: related-story
    attributes:
      label: User Story liée
      placeholder: "ex: #42"
    validations:
      required: false
