name: 🚀 Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version to deploy (tag name, leave empty for latest)"
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Determine Deployment Target ──────────────────────────────────────────────
  setup:
    name: 🎯 Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      version: ${{ steps.determine.outputs.version }}
    steps:
      - name: Determine environment and version
        id: determine
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Auto-deploy to staging for prereleases, production for stable releases
            if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
              echo "environment=staging" >> $GITHUB_OUTPUT
            else
              echo "environment=production" >> $GITHUB_OUTPUT
            fi
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            # Manual deployment
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version || github.sha }}" >> $GITHUB_OUTPUT
          fi

  # ─── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build for Deployment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 7

  # ─── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying version ${{ needs.setup.outputs.version }} to staging..."
          # TODO: Add your staging deployment commands here
          # Examples:
          # - rsync -avz dist/ user@staging.server:/var/www/app/
          # - aws s3 sync dist/ s3://staging-bucket/ --delete
          # - kubectl set image deployment/app app=${{ needs.setup.outputs.version }}
          echo "✅ Staging deployment completed!"

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests against staging..."
          # TODO: Add smoke tests here
          # curl -f https://staging.example.com/health || exit 1
          echo "✅ Smoke tests passed!"

      - name: Comment on related issues
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.setup.outputs.version }}';
            const message = `🚀 Version \`${version}\` has been deployed to **staging**.\n\n🔗 [staging.example.com](https://staging.example.com)`;

            // Find issues closed in this release
            const commits = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'HEAD~10',
              head: 'HEAD'
            });

            console.log('✅ Deployment notification sent');

  # ─── Deploy to Production ──────────────────────────────────────────────────────
  deploy-production:
    name: 🌍 Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'production'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Deploy to production
        run: |
          echo "🚀 Deploying version ${{ needs.setup.outputs.version }} to production..."
          # TODO: Add your production deployment commands here
          # Examples:
          # - rsync -avz dist/ user@prod.server:/var/www/app/
          # - aws s3 sync dist/ s3://production-bucket/ --delete
          # - kubectl set image deployment/app app=${{ needs.setup.outputs.version }} -n production
          echo "✅ Production deployment completed!"

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests against production..."
          # TODO: Add smoke tests here
          # curl -f https://example.com/health || exit 1
          echo "✅ Smoke tests passed!"

      - name: Notify team
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.setup.outputs.version }}';
            console.log(`✅ Version ${version} deployed to production successfully!`);
            // TODO: Send notification to Slack/Discord/Email

  # ─── Rollback (Manual) ─────────────────────────────────────────────────────────
  rollback:
    name: ⏪ Rollback (Manual)
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Rollback deployment
        run: |
          echo "⏪ Rolling back deployment..."
          # TODO: Add rollback commands
          echo "✅ Rollback completed"
