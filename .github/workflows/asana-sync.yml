name: 🔄 Asana → GitHub Issues Sync

on:
  schedule:
    # Runs every weekday at 8:00 AM UTC (adjust to your timezone)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      project_id:
        description: "Asana Project GID (leave empty to use default)"
        required: false
        type: string
      dry_run:
        description: "Dry run (log only, do not create issues)"
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  sync-asana-tasks:
    name: Sync Asana Tasks to GitHub Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-save @octokit/rest node-fetch

      - name: Run Asana → GitHub Issues sync
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID: ${{ inputs.project_id || secrets.ASANA_PROJECT_GID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/asana-sync.js

  # Job to report sync results as a PR/issue comment (optional)
  notify-sync-result:
    name: Notify Sync Results
    runs-on: ubuntu-latest
    needs: sync-asana-tasks
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Report sync status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.sync-asana-tasks.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const now = new Date().toISOString();
            console.log(`${emoji} Asana sync ${status} at ${now}`);
            // Optionally create an issue or send a notification
